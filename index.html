<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brihta</title>
  <link rel="stylesheet" href="style.css?v=6.0">
</head>
<body>
  <div class="container">

    <!-- ═══ TOOLBAR ═══ -->
    <div class="toolbar" id="toolbar">

      <!-- Always-visible top row -->
      <div class="toolbar-top">
        <div class="brand"><img src="brihta.png" alt="Brihta" class="brand-logo"><span>Brihta</span></div>
        <div class="toolbar-summary" id="toolbarSummary">
          <span id="summaryDataset">—</span>
          <span class="summary-sep">·</span>
          <span id="summaryMode">—</span>
          <span id="summaryFilter" style="display:none"></span>
        </div>
        <button class="toolbar-toggle-btn" id="toolbarToggle" title="Nastavitve">⚙️</button>
      </div>

      <!-- Collapsible controls -->
      <div class="toolbar-controls-wrap" id="toolbarControlsWrap">
        <div class="toolbar-controls">

          <!-- Subject -->
          <div class="ctrl-group">
            <label class="ctrl-label" for="subject">Predmet</label>
            <select id="subject" class="select" title="Izberi predmet"></select>
          </div>

          <!-- Dataset -->
          <div class="ctrl-group">
            <label class="ctrl-label" for="dataset">Nabor</label>
            <select id="dataset" class="select" title="Izberi nabor kartic"></select>
            <button id="reloadBtn" class="reload-btn" title="Naloži">↻</button>
          </div>

          <!-- Mode -->
          <div class="ctrl-group">
            <label class="ctrl-label" for="modeSelect">Način</label>
            <select id="modeSelect" class="select">
              <option value="flashcard">🃏 Kartice</option>
              <option value="quiz">🎯 Kviz</option>
              <option value="timed">⏱️ Tekma s časom</option>
            </select>
          </div>



        </div>
      </div>
    </div>

    <!-- ═══ SCORE HUD (quiz only) — includes rank legend as tooltip ═══ -->
    <div id="scoreHUD" class="score-hud" style="display:none"></div>

    <!-- ═══ MAIN CONTENT ═══ -->
    <div class="main-content">
      <div class="card-section">

        <!-- FLASHCARD PANEL -->
        <div id="flashcardPanel" class="card-panel">

          <div class="card-counter" id="cardCounter">Kartica 0 od 0</div>

          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressBar"></div>
          </div>

          <div class="direction-badge slo-to-eng" id="directionBadge" style="display:none"></div>

          <div id="cardContainer" class="card-container">
            <div class="card" id="flashcard">
              <div class="card-face card-front" id="cardFront">
                <img id="cardImage" class="card-image" style="display:none" alt="">
                <span class="card-text">Izberi nabor in klikni ↻</span>
                <span class="flip-hint">klikni za obrat</span>
              </div>
              <div class="card-face card-back" id="cardBack">
                <span class="card-text">🙂</span>
                <span class="flip-hint">klikni za obrat</span>
              </div>
            </div>
          </div>



          <div class="controls">
            <button class="btn" id="prevBtn" disabled>⬅️ Prejšnja</button>
            <button class="btn" id="nextBtn" disabled>Naslednja ➡️</button>
          </div>

          <div class="keyboard-hint">
            💡 Puščice za navigacijo, presledek za obračanje &nbsp;·&nbsp; 👆 Povleci levo/desno na mobilnih napravah
          </div>

        </div>

        <!-- QUIZ PANEL -->
        <div id="quizPanel" class="quiz-panel" style="display:none">
          <div id="quizArea" class="quiz-area">
            <div class="quiz-empty">Naloži nabor kartic in začni kviz! 🎯</div>
          </div>
        </div>

        <!-- TIMED PANEL -->
        <div id="timedPanel" class="timed-panel" style="display:none">
          <div id="timedArea" class="timed-area">
            <div class="quiz-empty">Naloži nabor kartic in začni tekmo! ⏱️</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="script.js?v=11"></script>

  <script>
    /* ── Toolbar collapse ── */
    const toolbar     = document.getElementById('toolbar');
    const toggleBtn   = document.getElementById('toolbarToggle');
    const controlsWrap = document.getElementById('toolbarControlsWrap');

    function collapseToolbar() {
      toolbar.classList.add('collapsed');
      toggleBtn.textContent = '⚙️';
    }
    function expandToolbar() {
      toolbar.classList.remove('collapsed');
      toggleBtn.textContent = '✕';
    }
    function isCollapsed() { return toolbar.classList.contains('collapsed'); }

    toggleBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      isCollapsed() ? expandToolbar() : collapseToolbar();
      // also close filter panel
      document.getElementById('filterPanel').classList.remove('open');
    });

    // Tap anywhere outside toolbar to collapse
    document.addEventListener('click', function(e) {
      if (!toolbar.contains(e.target) && !isCollapsed()) {
        collapseToolbar();
      }
    });

    /* ── Summary text updater ── */
    function updateSummary() {
      const datasetSel = document.getElementById('dataset');
      const modeSel    = document.getElementById('modeSelect');

      const datasetText = datasetSel.options[datasetSel.selectedIndex]?.text || '—';
      document.getElementById('summaryDataset').textContent = datasetText.replace(/^[^\w]*/, '');

      const modeMap = { flashcard: '🃏 Kartice', quiz: '🎯 Kviz', timed: '⏱️ Tekma' };
      document.getElementById('summaryMode').textContent = modeMap[modeSel.value] || modeSel.value;
      document.getElementById('summaryFilter').textContent = '';
    }

    /* ── Mode select ── */
    document.getElementById('modeSelect').addEventListener('change', function() {
      switchMode(this.value);
      updateSummary();
      setTimeout(collapseToolbar, 200);
    });

    /* ── Dataset change updates summary ── */
    document.getElementById('dataset').addEventListener('change', updateSummary);
    document.getElementById('subject').addEventListener('change', updateSummary);

    /* ── Collapse after reload ── */
    document.getElementById('reloadBtn').addEventListener('click', function() {
      updateSummary();
      setTimeout(collapseToolbar, 600);
    }, true); // capture so it fires before reloadBtn's own listener

    // Initial summary
    updateSummary();
  </script>
</body>
</html>
